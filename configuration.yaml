gradient:
  enabled: true
  mode: screen_matched
  gamma: 2.2
effects:
  plugins_dir: ''
  schedule: []
gpu:
  enabled: true
  prefer: cupy
  fallback_to_cpu: true
logging:
  level: INFO
  file_level: INFO
  file: logs/ambilight.log
  max_bytes: 20971520
  backup_count: 10
  show_fps: true
  fps_interval: 5.0
