devices:
- ip: 192.168.1.29
  mac: 30:3a:29:00:0c:00
  monitor_index: 1
  led_count: 30
  name: 192.168.1.29
  enabled: true
zones:
  top: 7
  bottom: 7
  left: 4
  right: 4
color:
  mode: dominant
  kmeans_clusters: 3
  ignore_black_threshold: 30
  ignore_white_threshold: 225
  saturation_weight_power: 2.0
  min_saturation: 0.05
smoothing:
  enabled: true
  base_alpha: 0.3
  adaptive_fast_threshold: 30
  adaptive_fast_alpha: 0.8
